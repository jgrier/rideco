<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>

    <linearGradient id="extGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#64748b"/>
      <stop offset="100%" stop-color="#475569"/>
    </linearGradient>

    <linearGradient id="restateGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1f2937"/>
      <stop offset="50%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>

    <linearGradient id="smGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>

    <linearGradient id="servGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>

    <linearGradient id="deGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>

    <linearGradient id="aiGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>

    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.35"/>
    </filter>

    <!-- Markers use userSpaceOnUse so they stay small regardless of stroke width. -->
    <marker id="arrow" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="6" markerUnits="userSpaceOnUse" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fbbf24"/>
    </marker>
    <marker id="arrowRev" viewBox="0 0 10 7" refX="1" refY="3.5" markerWidth="8" markerHeight="6" markerUnits="userSpaceOnUse" orient="auto">
      <polygon points="10 0, 0 3.5, 10 7" fill="#fbbf24"/>
    </marker>
    <marker id="arrowCyan" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="6" markerUnits="userSpaceOnUse" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="760" rx="12" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="600" y="28" text-anchor="middle" fill="#f1f5f9" font-size="22" font-weight="600">RideCo on Restate</text>
  <text x="600" y="50" text-anchor="middle" fill="#94a3b8" font-size="13">Only external clients and Restate talk to workers. Workers never call each other directly — every call flows through the Restate log.</text>

  <!-- =========== EXTERNAL CLIENTS (top, above Restate) =========== -->
  <text x="395" y="86" fill="#94a3b8" font-size="10" font-weight="700" letter-spacing="1.5">EXTERNAL CLIENTS</text>

  <rect x="390" y="92" width="110" height="55" rx="8" fill="url(#extGrad)" filter="url(#shadow)"/>
  <text x="445" y="125" text-anchor="middle" fill="white" font-size="13" font-weight="600">Rider app</text>

  <rect x="510" y="92" width="110" height="55" rx="8" fill="url(#extGrad)" filter="url(#shadow)"/>
  <text x="565" y="125" text-anchor="middle" fill="white" font-size="13" font-weight="600">Driver app</text>

  <rect x="630" y="92" width="150" height="55" rx="8" fill="url(#extGrad)" filter="url(#shadow)"/>
  <text x="705" y="116" text-anchor="middle" fill="white" font-size="12" font-weight="600">Mapping providers</text>
  <text x="705" y="132" text-anchor="middle" fill="#cbd5e1" font-size="10">weather · traffic · accidents</text>

  <rect x="790" y="92" width="120" height="55" rx="8" fill="url(#extGrad)" filter="url(#shadow)"/>
  <text x="850" y="116" text-anchor="middle" fill="white" font-size="12" font-weight="600">Human safety</text>
  <text x="850" y="132" text-anchor="middle" fill="white" font-size="12" font-weight="600">operator</text>

  <!-- Arrows external → Restate top edge (y=190) -->
  <!-- Rider, Driver: bidirectional yellow (sync application flow) -->
  <!-- Mapping, Operator: one-way cyan (pure event publishers) -->
  <line x1="445" y1="147" x2="445" y2="190" stroke="#fbbf24" stroke-width="2" marker-end="url(#arrow)" marker-start="url(#arrowRev)"/>
  <line x1="565" y1="147" x2="565" y2="190" stroke="#fbbf24" stroke-width="2" marker-end="url(#arrow)" marker-start="url(#arrowRev)"/>
  <line x1="705" y1="147" x2="705" y2="190" stroke="#22d3ee" stroke-width="2" marker-end="url(#arrowCyan)"/>
  <line x1="850" y1="147" x2="850" y2="190" stroke="#22d3ee" stroke-width="2" marker-end="url(#arrowCyan)"/>

  <!-- =========== LEFT COLUMN — STATEFUL MICROSERVICES =========== -->
  <text x="55" y="185" fill="#93c5fd" font-size="10" font-weight="700" letter-spacing="1.5">STATEFUL MICROSERVICES</text>
  <rect x="40" y="190" width="270" height="475" rx="10" fill="#1e3a8a" fill-opacity="0.10" stroke="#3b82f6" stroke-opacity="0.30" stroke-width="1"/>

  <rect x="55" y="205" width="240" height="100" rx="8" fill="url(#smGrad)" filter="url(#shadow)"/>
  <text x="175" y="232" text-anchor="middle" fill="white" font-size="14" font-weight="600">Trip</text>
  <text x="175" y="252" text-anchor="middle" fill="#dbeafe" font-size="11">VO / trip_id</text>
  <text x="175" y="272" text-anchor="middle" fill="#bfdbfe" font-size="10">lifecycle state machine</text>
  <text x="175" y="289" text-anchor="middle" fill="#bfdbfe" font-size="10">suspends on awakeable for match</text>

  <rect x="55" y="320" width="240" height="100" rx="8" fill="url(#smGrad)" filter="url(#shadow)"/>
  <text x="175" y="347" text-anchor="middle" fill="white" font-size="14" font-weight="600">Offers</text>
  <text x="175" y="367" text-anchor="middle" fill="#dbeafe" font-size="11">stateless service</text>
  <text x="175" y="387" text-anchor="middle" fill="#bfdbfe" font-size="10">synthesizes ETA + Pricing</text>
  <text x="175" y="404" text-anchor="middle" fill="#bfdbfe" font-size="10">into a ranked offer</text>

  <rect x="55" y="435" width="240" height="100" rx="8" fill="url(#smGrad)" filter="url(#shadow)"/>
  <text x="175" y="462" text-anchor="middle" fill="white" font-size="14" font-weight="600">ETA</text>
  <text x="175" y="482" text-anchor="middle" fill="#dbeafe" font-size="11">stateless service</text>
  <text x="175" y="502" text-anchor="middle" fill="#bfdbfe" font-size="10">arrival prediction</text>
  <text x="175" y="519" text-anchor="middle" fill="#bfdbfe" font-size="10">reads region features</text>

  <rect x="55" y="550" width="240" height="100" rx="8" fill="url(#smGrad)" filter="url(#shadow)"/>
  <text x="175" y="577" text-anchor="middle" fill="white" font-size="14" font-weight="600">Pricing</text>
  <text x="175" y="597" text-anchor="middle" fill="#dbeafe" font-size="11">VO / region</text>
  <text x="175" y="617" text-anchor="middle" fill="#bfdbfe" font-size="10">surge multiplier</text>
  <text x="175" y="634" text-anchor="middle" fill="#bfdbfe" font-size="10">↻ refresh every 10s</text>

  <!-- Bidirectional arrows: Restate ↔ left workers -->
  <line x1="295" y1="255" x2="350" y2="255" stroke="#fbbf24" stroke-width="2" marker-end="url(#arrow)" marker-start="url(#arrowRev)"/>
  <line x1="295" y1="370" x2="350" y2="370" stroke="#fbbf24" stroke-width="2" marker-end="url(#arrow)" marker-start="url(#arrowRev)"/>
  <line x1="295" y1="485" x2="350" y2="485" stroke="#fbbf24" stroke-width="2" marker-end="url(#arrow)" marker-start="url(#arrowRev)"/>
  <line x1="295" y1="600" x2="350" y2="600" stroke="#fbbf24" stroke-width="2" marker-end="url(#arrow)" marker-start="url(#arrowRev)"/>

  <!-- =========== RESTATE (center, smaller) =========== -->
  <rect x="355" y="190" width="490" height="380" rx="12" fill="url(#restateGrad)" stroke="#475569" stroke-width="2" filter="url(#shadow)"/>
  <rect x="368" y="203" width="464" height="354" rx="8" fill="none" stroke="#3b82f6" stroke-opacity="0.25" stroke-width="1.5" stroke-dasharray="4,4"/>

  <text x="600" y="245" text-anchor="middle" fill="#f1f5f9" font-size="26" font-weight="700" letter-spacing="3">RESTATE</text>
  <text x="600" y="271" text-anchor="middle" fill="#94a3b8" font-size="12">ingress · durable log · invocation dispatcher · state</text>

  <text x="600" y="318" text-anchor="middle" fill="#cbd5e1" font-size="12">Every call — sync or `/send` — is journaled here</text>
  <text x="600" y="335" text-anchor="middle" fill="#cbd5e1" font-size="12">before any worker sees it.</text>

  <text x="600" y="370" text-anchor="middle" fill="#cbd5e1" font-size="12">Restate invokes the worker over HTTP.</text>
  <text x="600" y="387" text-anchor="middle" fill="#cbd5e1" font-size="12">Workers never talk to each other directly.</text>

  <text x="600" y="422" text-anchor="middle" fill="#cbd5e1" font-size="12">Awakeables let a handler suspend on a token</text>
  <text x="600" y="439" text-anchor="middle" fill="#cbd5e1" font-size="12">and resume when another handler resolves it.</text>

  <text x="600" y="500" text-anchor="middle" fill="#94a3b8" font-size="11" font-style="italic">workers are stateless processes — state, durability,</text>
  <text x="600" y="517" text-anchor="middle" fill="#94a3b8" font-size="11" font-style="italic">retries, ordering, scheduling all live in here</text>

  <!-- =========== RIGHT COLUMN (split into Serving + Durable Execution) =========== -->

  <!-- Sub-band 1: EVENT-DRIVEN APPS / SERVING -->
  <text x="905" y="185" fill="#c4b5fd" font-size="10" font-weight="700" letter-spacing="1.5">EVENT-DRIVEN APPS / SERVING</text>
  <rect x="890" y="190" width="270" height="230" rx="10" fill="#4c1d95" fill-opacity="0.10" stroke="#8b5cf6" stroke-opacity="0.30" stroke-width="1"/>

  <rect x="905" y="205" width="240" height="100" rx="8" fill="url(#servGrad)" filter="url(#shadow)"/>
  <text x="1025" y="232" text-anchor="middle" fill="white" font-size="14" font-weight="600">Locations</text>
  <text x="1025" y="252" text-anchor="middle" fill="#ede9fe" font-size="11">VO / driver_id</text>
  <text x="1025" y="272" text-anchor="middle" fill="#ddd6fe" font-size="10">ingests GPS + status</text>
  <text x="1025" y="289" text-anchor="middle" fill="#ddd6fe" font-size="10">serves driver position</text>

  <rect x="905" y="320" width="240" height="85" rx="8" fill="url(#servGrad)" filter="url(#shadow)"/>
  <text x="1025" y="345" text-anchor="middle" fill="white" font-size="14" font-weight="600">Features</text>
  <text x="1025" y="365" text-anchor="middle" fill="#ede9fe" font-size="11">VO / entity:id:name</text>
  <text x="1025" y="383" text-anchor="middle" fill="#ddd6fe" font-size="10">ingests feature updates</text>
  <text x="1025" y="398" text-anchor="middle" fill="#ddd6fe" font-size="10">serves on read</text>

  <!-- Sub-band 2: DURABLE EXECUTION -->
  <text x="905" y="445" fill="#fcd34d" font-size="10" font-weight="700" letter-spacing="1.5">DURABLE EXECUTION</text>
  <rect x="890" y="450" width="270" height="215" rx="10" fill="#78350f" fill-opacity="0.10" stroke="#f59e0b" stroke-opacity="0.30" stroke-width="1"/>

  <rect x="905" y="465" width="240" height="85" rx="8" fill="url(#deGrad)" filter="url(#shadow)"/>
  <text x="1025" y="490" text-anchor="middle" fill="white" font-size="14" font-weight="600">Dispatch</text>
  <text x="1025" y="510" text-anchor="middle" fill="#fef3c7" font-size="11">VO / region</text>
  <text x="1025" y="527" text-anchor="middle" fill="#fde68a" font-size="10">batched matching · ↻ 5s</text>
  <text x="1025" y="542" text-anchor="middle" fill="#fde68a" font-size="10">resolves trip awakeables</text>

  <rect x="905" y="565" width="240" height="85" rx="8" fill="url(#aiGrad)" filter="url(#shadow)"/>
  <text x="1025" y="590" text-anchor="middle" fill="white" font-size="14" font-weight="600">SafetyAgent</text>
  <text x="1025" y="610" text-anchor="middle" fill="#fce7f3" font-size="11">VO / trip_id · AI Agent</text>
  <text x="1025" y="627" text-anchor="middle" fill="#fbcfe8" font-size="10">monitor · awakeable · ↻ 8s</text>
  <text x="1025" y="642" text-anchor="middle" fill="#fbcfe8" font-size="10">ctx.run for LLM (mocked)</text>

  <!-- One-way arrows: Restate → right workers -->
  <line x1="845" y1="255" x2="900" y2="255" stroke="#22d3ee" stroke-width="2" marker-end="url(#arrowCyan)"/>
  <line x1="845" y1="362" x2="900" y2="362" stroke="#22d3ee" stroke-width="2" marker-end="url(#arrowCyan)"/>
  <line x1="845" y1="507" x2="900" y2="507" stroke="#22d3ee" stroke-width="2" marker-end="url(#arrowCyan)"/>
  <line x1="845" y1="607" x2="900" y2="607" stroke="#22d3ee" stroke-width="2" marker-end="url(#arrowCyan)"/>

  <!-- =========== LEGEND =========== -->
  <g transform="translate(40, 690)">
    <text x="0" y="0" fill="#cbd5e1" font-size="11" font-weight="700" letter-spacing="1.5">FLOW</text>

    <line x1="0" y1="20" x2="60" y2="20" stroke="#fbbf24" stroke-width="2" marker-end="url(#arrow)" marker-start="url(#arrowRev)"/>
    <text x="75" y="24" fill="#e2e8f0" font-size="11">sync request flow — caller may await the response; both call/await and send/forget go through the Restate log</text>

    <line x1="0" y1="44" x2="60" y2="44" stroke="#22d3ee" stroke-width="2" marker-end="url(#arrowCyan)"/>
    <text x="75" y="48" fill="#e2e8f0" font-size="11">event stream — receiver is event-driven; caller never awaits. Sync `get` reads for serving aren't drawn.</text>
  </g>
</svg>
